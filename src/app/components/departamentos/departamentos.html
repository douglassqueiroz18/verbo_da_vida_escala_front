<div class="container">
  <h2>Departamentos</h2>
  <p>Cadastre e gerencie os departamentos da organização.</p>

  <div class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput [(ngModel)]="novo.nome">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descrição</mat-label>
      <input matInput [(ngModel)]="novo.descricao">
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="salvar()">Adicionar</button>
  </div>

  <div class="table-container mat-elevation-z8">
    <table mat-table [dataSource]="lista">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let d"> {{d.nome}} </td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef> Descrição </th>
        <td mat-cell *matCellDef="let d"> {{d.descricao}} </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef> Ações </th>
        <td mat-cell *matCellDef="let d">
          <button mat-icon-button color="warn" (click)="deletar(d.id!)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['nome', 'descricao', 'acoes']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['nome', 'descricao', 'acoes'];"></tr>
    </table>
  </div>
</div>
