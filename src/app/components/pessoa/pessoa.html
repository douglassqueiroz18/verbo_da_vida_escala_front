<div class="container">
  <h2>Gestão de Pessoas</h2>

  <div class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput [(ngModel)]="novo.nome" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Telefone</mat-label>
      <input matInput [(ngModel)]="novo.telefone" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Departamentos</mat-label>
      <mat-select [(ngModel)]="novo.departamentos" multiple>
        <mat-option *ngFor="let d of departamentos" [value]="d.id">
          {{ d.nome }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="button-group">
      <button mat-raised-button color="primary" (click)="salvar()">
        {{ novo.id ? 'Atualizar' : 'Salvar' }}
      </button>
      <button mat-button (click)="limparForm()">Cancelar</button>
    </div>
  </div>

  <table mat-table [dataSource]="lista">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let element">{{ element.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="telefone">
      <th mat-header-cell *matHeaderCellDef>Telefone</th>
      <td mat-cell *matCellDef="let element">{{ element.telefone }}</td>
    </ng-container>

    <ng-container matColumnDef="departamentos">
      <th mat-header-cell *matHeaderCellDef>Departamentos</th>
      <td mat-cell *matCellDef="let element">
        {{ getNomeDepartamento(element.departamentos) }}
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" (click)="editar(element)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deletar(element.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['nome', 'telefone', 'departamentos', 'acoes']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['nome', 'telefone', 'departamentos', 'acoes']"></tr>
  </table>
</div>
