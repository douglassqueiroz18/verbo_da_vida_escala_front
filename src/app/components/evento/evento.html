<div class="actions">
  <button mat-stroked-button (click)="voltar()">
    <mat-icon>arrow_back</mat-icon>
    Voltar
  </button>
</div>
<div class="container">
  <h2>Eventos</h2>
  <p>Cadastre e gerencie os eventos da agenda.</p>

  <div class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Nome do Evento</mat-label>
      <input matInput [(ngModel)]="novo.nome">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Data</mat-label>
      <input matInput [matDatepicker]="picker" [(ngModel)]="novo.data">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo de evento</mat-label>
      <input matInput [(ngModel)]="novo.tipo_evento" placeholder="Ex: Interno, Externo">
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="salvar()">Salvar Evento</button>
  </div>

  <div class="table-container mat-elevation-z8" style="margin-top: 20px;">
    <table mat-table [dataSource]="lista">
      <ng-container matColumnDef="nome"><th mat-header-cell *matHeaderCellDef>Nome</th><td mat-cell *matCellDef="let e">{{ e.nome }}</td></ng-container>
      <ng-container matColumnDef="data"><th mat-header-cell *matHeaderCellDef>Data</th><td mat-cell *matCellDef="let e">{{ e.data | date:'dd/MM/yyyy' }}</td></ng-container>
      <ng-container matColumnDef="tipo_evento"><th mat-header-cell *matHeaderCellDef>Tipo</th><td mat-cell *matCellDef="let e">{{ e.tipo_evento }}</td></ng-container>
      
      <tr mat-header-row *matHeaderRowDef="['nome', 'data', 'tipo_evento']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['nome', 'data', 'tipo_evento'];"></tr>
    </table>
  </div>
</div>
